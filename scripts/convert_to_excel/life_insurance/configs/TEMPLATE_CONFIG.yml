# Template configuration for life insurance converters
# Copy this file and customize for each company
# IMPORTANT: Adjust x_thresholds based on the specific company's PDF layout

company_id: pt_template_company  # Change to company's ID
sheet_name: template_company      # Change to company's sheet name
pdf_period_sep: "-"               # Usually "-" or "_"
thousands_sep: ","                # Usually "," for life insurance, "." for Indonesian format

# PDF EXTRACTION PARAMETERS
# These are critical and must be adjusted for each company's PDF

content_start_y: 70.0
# Y-coordinate where content data begins (not headers)
# Find by examining: pdftotext -bbox-layout output
# Typical range: 60-100 (higher for companies with larger headers)

row_cluster_tol: 0.8
# Tolerance for grouping words on same horizontal line into one row
# Typical range: 0.75-1.0
# Increase if words on same line are being split; decrease if different lines grouped together

x_thresholds: [140, 180, 220, 370, 420, 530, 570, 690, 730]
# CRITICAL: These thresholds divide the horizontal space into columns
# Adjust based on company's PDF layout using bbox analysis:
#
# Example threshold meanings:
#  x < 140    → B (labels)
#  140 ≤ x < 180 → C (Assets 2026)
#  180 ≤ x < 220 → D (Assets 2025)
#  220 ≤ x < 370 → F (Liab labels)
#  370 ≤ x < 420 → G (Liab 2026)
#  420 ≤ x < 530 → H (Liab 2025)
#  530 ≤ x < 570 → J (Income labels)
#  570 ≤ x < 690 → K (Income 2026)
#  690 ≤ x < 730 → L (Income 2025)
#  730 ≤ x      → N+ (Health section)
#
# To find correct values for a company:
# 1. Run: pdftotext -bbox-layout [pdf] - | grep "[0-9],[0-9]" | head -30
# 2. Note x-coordinate ranges for first value column, second value column, etc.
# 3. Set thresholds at boundaries between sections

body_cols: [B, C, D, F, G, H, J, K, L, N, O, P]
# Column assignments for extracted data - use standard layout above
# DO NOT CHANGE unless you restructure the template

value_cols: [C, D, G, H, K, L, O, P]
# Which columns contain numeric values (used for alignment/formatting in template writer)

bold_tokens: [JUMLAH, TOTAL, LABA, RUGI, INVESTASI, BUKAN, UTANG, CADANGAN,
              KOMISARIS, DIREKSI, PEMILIK, REASURADUR, KETERANGAN, PENDAPATAN, BEBAN]
# Keywords that indicate a row should be bold (section headers, subtotals)

center_tokens: [KETERANGAN, URAIAN, PEMENUHAN, TINGKAT, SOLVABILITAS, RASIO]
# Keywords that indicate a row should be center-aligned

skip_labels: []
# Labels to skip during template matching (doesn't try to find template row)
# Add reinsurer names, commissioner names, footer text, etc. that appear in extracted data
# but aren't actual financial KPIs
#
# Example entries:
#  - "PT Maskapai Reasuransi Indonesia"
#  - "PRESIDEN KOMISARIS"
#  - "Leo Michel Grepin"
#  - "2026 2025"  # Header remnants

# TEMPLATE STYLING
page_size: LETTER
zoom: 70
margins: {left: 0.2, right: 0.2, top: 0.25, bottom: 0.25, header: 0.1, footer: 0.1}
row_height_scale: 1.15
# row_height_max: 35.0  # Uncomment to cap maximum row height

col_widths:
  A: 4.0
  B: 28.5
  C: 12.0
  D: 12.0
  E: 2.0
  F: 26.0
  G: 12.0
  H: 12.0
  I: 2.0
  J: 32.0
  K: 12.0
  L: 12.0
  M: 2.0
  N: 33.0
  O: 12.0
  P: 12.0

colors:
  section: "1F3763"
  header:  "D9E2F3"
  year:    "EEF3FB"
  subtle:  "F2F2F2"

period:
  comparison: prior_year_same_month
  current_label: "{YEAR4}"
  prior_label:   "{PRIOR_YEAR4}"

# HEADER CUSTOMIZATION
# Customize company name and header text
header_rows:
  1: {text: "PT COMPANY NAME", size: 13, bold: true, height: 18}
  2: {text: "LAPORAN KEUANGAN BULANAN", size: 12, bold: true, height: 18}
  3: {text: "Per {day} {month_full} {YEAR4} dan {PRIOR_YEAR4}", size: 9, bold: true, height: 15}

section_bars:
  row_heights: [17, 13, 13]
  items:
    - range: "A7:D9"
      text: "LAPORAN POSISI KEUANGAN\nPER {day} {MONTH_FULL} {YEAR4} DAN {PRIOR_YEAR4}\n(Dalam Jutaan Rupiah)"
    - range: "J7:L9"
      text: "LAPORAN LABA RUGI KOMPREHENSIF\nUntuk Periode yang Berakhir {day} {month_full} {YEAR4} dan {PRIOR_YEAR4}\n(Dalam Jutaan Rupiah)"
    - range: "N7:P9"
      text: "TINGKAT KESEHATAN KEUANGAN\nPER {day} {MONTH_FULL} {YEAR4} DAN {PRIOR_YEAR4}\n(Dalam Jutaan Rupiah)"

col_headers:
  height: 18
  items:
    - range: "A10:D10"
      text: "ASET"
    - range: "F10:H10"
      text: "LIABILITAS DAN EKUITAS"
    - range: "J10:L10"
      text: "URAIAN"
    - range: "N10:P10"
      text: "KETERANGAN"

year_labels:
  height: 15
  cells:
    C11: current
    D11: prior
    G11: current
    H11: prior
    K11: current
    L11: prior
    O11: current
    P11: prior

# BOTTOM SECTION (Commissioners, Directors, Owners)
# Optional: configure if commissioners/directors are in extracted data
bottom_section:
  komisaris_col: B         # Column containing commissioner names
  pemilik_col: B           # Column containing owner names
  jakarta_col: N           # Column containing Jakarta date

# ADVANCED: Label mapping for manually fixing unmatched labels
# Use when a template label can't be matched due to PDF text variations
# label_map:
#   assets:
#     "Custom PDF Label": 18  # Maps to row 18 in template
#   liabilities:
#     "Another Variant": 25
