company_id: pt_aia_financial
sheet_name: pt_aia_financial
pdf_period_sep: "-"
thousands_sep: ","    # Uses comma as thousands separator

# PDF extraction parameters - these define where content starts and how rows are grouped
content_start_y: 70.0
row_cluster_tol: 0.8
x_thresholds: [140, 180, 220, 370, 420, 530, 570, 690, 730]
body_cols: [B, C, D, F, G, H, J, K, L, N, O, P]
value_cols: [C, D, G, H, K, L, O, P]
bold_tokens: [JUMLAH, TOTAL, LABA, RUGI, INVESTASI, BUKAN, UTANG, CADANGAN, KOMISARIS, DIREKSI, PEMILIK, REASURADUR, KETERANGAN, PENDAPATAN, BEBAN]
center_tokens: [KETERANGAN, URAIAN, PEMENUHAN, TINGKAT, SOLVABILITAS, RASIO]

# Financial data section configuration
skip_labels:
  - "LIABILITAS DAN EKUITAS"
  - "2026 2025"
  - "PT Maskapai Reasuransi Indonesia, Tbk."
  - "PT Reasuransi Indonesia Utama"
  - "PT Reasuransi Nasional Indonesia"
  - "AIA Company Ltd Hongkong"
  - "Zurich Insurance Company"
  - "Munich Reinsurance Singapore"
  - "Hannover Reinsurance Hongkong"
  - "Swiss Reinsurance Singapore"
  - "KOMISARIS INDEPENDEN"
  - "DIREKSI"
  - "DIREKTUR HUKUM DAN KEPATUHAN"
  - "DIREKTUR DISTRIBUSI KEMITRAAN"
  - "DIREKTUR OPERASIONAL"
  - "PEMILIK PERUSAHAAN"
  - "PRESIDEN KOMISARIS"
  - "Leo Michel Grepin"

page_size: LETTER
zoom: 70
margins: {left: 0.2, right: 0.2, top: 0.25, bottom: 0.25, header: 0.1, footer: 0.1}
row_height_scale: 1.15

col_widths:
  A: 4.0
  B: 28.5
  C: 12.0
  D: 12.0
  E: 2.0
  F: 26.0
  G: 12.0
  H: 12.0
  I: 2.0
  J: 32.0
  K: 12.0
  L: 12.0
  M: 2.0
  N: 33.0
  O: 12.0
  P: 12.0

colors:
  section: "1F3763"
  header:  "D9E2F3"
  year:    "EEF3FB"
  subtle:  "F2F2F2"

period:
  comparison: prior_year_same_month
  current_label: "{YEAR4}"
  prior_label:   "{PRIOR_YEAR4}"

header_rows:
  1: {text: "PT AIA FINANCIAL", size: 13, bold: true, height: 18}
  2: {text: "LAPORAN BULANAN KEUANGAN", size: 12, bold: true, height: 18}
  3: {text: "Per {day} {month_full} {YEAR4} dan {PRIOR_YEAR4}", size: 9, bold: true, height: 15}

section_bars:
  row_heights: [17, 13, 13]
  items:
    - range: "A7:D9"
      text: "LAPORAN POSISI KEUANGAN\nPER {day} {MONTH_FULL} {YEAR4} DAN {PRIOR_YEAR4}\n(Dalam Jutaan Rupiah)"
    - range: "J7:L9"
      text: "LAPORAN LABA RUGI KOMPREHENSIF\nUntuk Periode yang Berakhir {day} {month_full} {YEAR4} dan {PRIOR_YEAR4}\n(Dalam Jutaan Rupiah)"
    - range: "N7:P9"
      text: "TINGKAT KESEHATAN KEUANGAN\nPER {day} {MONTH_FULL} {YEAR4} DAN {PRIOR_YEAR4}\n(Dalam Jutaan Rupiah)"

col_headers:
  height: 18
  items:
    - range: "A10:D10"
      text: "ASET"
    - range: "F10:H10"
      text: "LIABILITAS DAN EKUITAS"
    - range: "J10:L10"
      text: "URAIAN"
    - range: "N10:P10"
      text: "KETERANGAN"

year_labels:
  height: 15
  cells:
    C11: current
    D11: prior
    G11: current
    H11: prior
    K11: current
    L11: prior
    O11: current
    P11: prior

bottom_section:
  komisaris_col: B
  pemilik_col: B
  jakarta_col: N
