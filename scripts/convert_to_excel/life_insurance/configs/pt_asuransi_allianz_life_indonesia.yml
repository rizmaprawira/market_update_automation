company_id: pt_asuransi_allianz_life_indonesia
sheet_name: pt_asuransi_allianz_life_indonesia
pdf_period_sep: "-"
thousands_sep: ","    # Uses US comma-separated format (1,234,567.89)

# PDF extraction parameters
# X_thresholds maps X-coordinates to columns: [end_of_A, end_of_B, ..., end_of_K]
# Results in 12 columns (A-L) for Assets, Liabilities, Income, Health sections
content_start_y: 170.0
row_cluster_tol: 0.8
x_thresholds: [100, 240, 290, 340, 520, 570, 680, 810, 860, 900, 970]
body_cols: [B, C, D, F, G, H, J, K, L, N, O, P]
value_cols: [C, D, G, H, K, L, O, P]

bold_tokens:
  - JUMLAH
  - TOTAL
  - LABA
  - RUGI
  - INVESTASI
  - BUKAN
  - UTANG
  - CADANGAN
  - PENDAPATAN
  - BEBAN
  - PEMENUHAN
  - TINGKAT
  - SOLVABILITAS

center_tokens:
  - KETERANGAN
  - URAIAN
  - PEMENUHAN
  - TINGKAT
  - SOLVABILITAS
  - RASIO

skip_labels:
  # Reinsurer/counterparty names that appear in financial data
  - "PT Maskapai Reasuransi"
  - "PT Reasuransi Indonesia Utama"
  - "PT Reasuransi Nasional"
  - "Zurich Insurance"
  - "Munich Reinsurance"
  - "Hannover Reinsurance"
  - "Swiss Reinsurance"
  # Officer names that might appear
  - "Direktur"
  - "Komisaris"
  - "Presiden"

# Excel output styling
page_size: LETTER
zoom: 70
margins: {left: 0.2, right: 0.2, top: 0.25, bottom: 0.25, header: 0.1, footer: 0.1}
row_height_scale: 1.15
row_height_max: 25.0

col_widths:
  A: 4.0
  B: 28.5
  C: 12.0
  D: 12.0
  E: 2.0
  F: 26.0
  G: 12.0
  H: 12.0
  I: 2.0
  J: 32.0
  K: 12.0
  L: 12.0
  M: 2.0
  N: 33.0
  O: 12.0
  P: 12.0

colors:
  section: "1F3763"
  header:  "D9E2F3"
  year:    "EEF3FB"
  subtle:  "F2F2F2"

period:
  comparison: prior_year_same_month
  current_label: "{YEAR4}"
  prior_label:   "{PRIOR_YEAR4}"

header_rows:
  1: {text: "PT ASURANSI ALLIANZ LIFE INDONESIA", size: 13, bold: true, height: 18}
  2: {text: "LAPORAN KEUANGAN BULANAN KONVENSIONAL", size: 12, bold: true, height: 18}
  3: {text: "Per {day} {month_full} {YEAR4} dan {PRIOR_YEAR4}", size: 9, bold: true, height: 15}

section_bars:
  row_heights: [17, 13, 13]
  items:
    - range: "A7:D9"
      text: "LAPORAN POSISI KEUANGAN\nPER {day} {MONTH_FULL} {YEAR4} DAN {PRIOR_YEAR4}\n(Dalam Jutaan Rupiah)"
    - range: "J7:L9"
      text: "LAPORAN LABA (RUGI) KOMPREHENSIF\nPER {day} {MONTH_FULL} {YEAR4} DAN {PRIOR_YEAR4}\n(Dalam Jutaan Rupiah)"
    - range: "N7:P9"
      text: "INDIKATOR KESEHATAN KEUANGAN\nPER {day} {MONTH_FULL} {YEAR4} DAN {PRIOR_YEAR4}\n(Dalam Jutaan Rupiah)"

col_headers:
  height: 18
  items:
    - range: "A10:D10"
      text: "ASET"
    - range: "F10:H10"
      text: "LIABILITAS DAN EKUITAS"
    - range: "J10:L10"
      text: "URAIAN"
    - range: "N10:P10"
      text: "KETERANGAN"

year_labels:
  height: 15
  cells:
    C11: prior
    D11: current
    G11: prior
    H11: current
    K11: prior
    L11: current
    O11: prior
    P11: current
